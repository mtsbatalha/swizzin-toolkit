#!/usr/bin/env bash
# conf/defaults.conf — Default configuration for swizzin-toolkit
# Override any of these by exporting the variable before calling toolkit.sh

# Backup root directory (where all backup sessions are stored)
TOOLKIT_BACKUP_ROOT="${TOOLKIT_BACKUP_ROOT:-/root/swizzin-toolkit-backups}"

# Tuning backup root (saved before any tuning change)
TOOLKIT_TUNE_BACKUP_ROOT="${TOOLKIT_TUNE_BACKUP_ROOT:-/root/swizzin-toolkit-backups/.tuning}"

# Installation directory (used by install.sh)
TOOLKIT_INSTALL_DIR="${TOOLKIT_INSTALL_DIR:-/opt/swizzin-toolkit}"

# sysctl config file written by the toolkit
TOOLKIT_SYSCTL_FILE="${TOOLKIT_SYSCTL_FILE:-/etc/sysctl.d/99-swizzin-toolkit.conf}"

# udev rule for I/O scheduler persistence
TOOLKIT_UDEV_RULE="${TOOLKIT_UDEV_RULE:-/etc/udev/rules.d/60-swizzin-toolkit-scheduler.rules}"

# Plex systemd override directory
TOOLKIT_PLEX_OVERRIDE_DIR="${TOOLKIT_PLEX_OVERRIDE_DIR:-/etc/systemd/system/plexmediaserver.service.d}"

# Name of the override file inside the above directory
TOOLKIT_PLEX_OVERRIDE_FILE="${TOOLKIT_PLEX_OVERRIDE_FILE:-swizzin-toolkit.conf}"

# How many backup archives to keep per app (per user) before pruning oldest
BACKUP_RETENTION_COUNT="${BACKUP_RETENTION_COUNT:-10}"

# Log file (set to /dev/null to disable file logging)
TOOLKIT_LOG="${TOOLKIT_LOG:-/var/log/swizzin-toolkit.log}"

# Plex data path
PLEX_DATA_PATH="${PLEX_DATA_PATH:-/var/lib/plexmediaserver/Library/Application Support/Plex Media Server}"

# Swizzin lock files directory
SWIZZIN_LOCK_DIR="${SWIZZIN_LOCK_DIR:-/install}"

# Swizzin master user info file
SWIZZIN_MASTER_INFO="${SWIZZIN_MASTER_INFO:-/root/.master.info}"

# Swizzin globals source
SWIZZIN_GLOBALS="${SWIZZIN_GLOBALS:-/etc/swizzin/sources/globals.sh}"
